name: fix-bug
description: Diagnose and fix a bug — reproduce, locate, fix, verify

nodes:
  - id: reproduce
    type: prompt
    prompt: |
      Bug report: $USER_MESSAGE

      First, try to understand and reproduce the bug:
      1. Read relevant files to understand the expected behavior
      2. If possible, run the failing code or test to confirm the bug
      3. Identify the root cause — not just the symptom

      Do NOT fix anything yet.
    allowed_tools: [read, grep, find, ls, bash]

  - id: fix
    type: prompt
    prompt: |
      Now fix the bug you identified. Make the minimal change needed.
      Do not refactor surrounding code or add unrelated improvements.
    allowed_tools: [read, grep, find, ls, bash, edit, write]

  - id: verify
    type: prompt
    prompt: |
      Verify the fix:
      1. Re-read the changed code to check correctness
      2. Run the test or reproduction step again to confirm the fix
      3. Check for regressions — did you break anything else?

      Report: what was broken, what you changed, and how you verified it.
    allowed_tools: [read, grep, find, ls, bash]
